schema_version = "1.1"

[task]
name = "agentforge/smoke"
description = "Create a marker file to verify AgentForge can drive a Harbor sandbox."
authors = [{ name = "AgentForge", email = "demo@example.com" }]
keywords = ["agentforge", "smoke", "terminal-bench"]

[metadata]
difficulty = "easy"
category = "smoke"

[verifier]
timeout_sec = 60.0

[agent]
timeout_sec = 300.0

[environment]
docker_image = "python:3.11-slim"
cpus = 1
memory_mb = 1024
storage_mb = 2048
allow_internet = false
