services:
  dashboard:
    build: ../dashboard
    environment:
      SQS_ENDPOINT_URL: http://elasticmq:9324
      STORAGE_BACKEND: dynamodb
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: AKIDLOCAL
      AWS_SECRET_ACCESS_KEY: secretlocal
    ports:
      - "8080:80"
    depends_on:
      - elasticmq
      - dynamodb-local

  elasticmq:
    image: softwaremill/elasticmq-native:latest
    ports:
      - "9324:9324"
      - "9325:9325"
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf
    command: -Dconfig.file=/opt/elasticmq.conf

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniopassword
    ports:
      - "9000:9000"
      - "9001:9001"

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    ports:
      - "8000:8000"

  n8n:
    image: n8nio/n8n:latest
    environment:
      N8N_SECURE_COOKIE: "false"
      N8N_HOST: localhost
      WEBHOOK_URL: http://localhost:5678/
    ports:
      - "5678:5678"

  agent-research:
    build: ../agents
    environment:
      AGENT_TYPE: researcher
      SQS_ENDPOINT_URL: http://elasticmq:9324
      LLM_PROVIDER: nim
      NIM_API_KEY: ${NIM_API_KEY}
      NIM_MODEL: ${NIM_MODEL:-meta/llama-3.1-8b-instruct}
      NIM_BASE_URL: ${NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      DASHBOARD_BASE_URL: http://dashboard
    depends_on:
      - elasticmq

  agent-summarizer:
    build: ../agents
    environment:
      AGENT_TYPE: summarizer
      SQS_ENDPOINT_URL: http://elasticmq:9324
      LLM_PROVIDER: nim
      NIM_API_KEY: ${NIM_API_KEY}
      NIM_MODEL: ${NIM_MODEL:-meta/llama-3.1-8b-instruct}
      NIM_BASE_URL: ${NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      DASHBOARD_BASE_URL: http://dashboard
    depends_on:
      - elasticmq

  agent-reviewer:
    build: ../agents
    environment:
      AGENT_TYPE: reviewer
      SQS_ENDPOINT_URL: http://elasticmq:9324
      LLM_PROVIDER: nim
      NIM_API_KEY: ${NIM_API_KEY}
      NIM_MODEL: ${NIM_MODEL:-meta/llama-3.1-8b-instruct}
      NIM_BASE_URL: ${NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      DASHBOARD_BASE_URL: http://dashboard
    depends_on:
      - elasticmq

  agent-skill:
    build: ../agents
    environment:
      AGENT_TYPE: skill
      SQS_ENDPOINT_URL: http://elasticmq:9324
      LLM_PROVIDER: nim
      NIM_API_KEY: ${NIM_API_KEY}
      NIM_MODEL: ${NIM_MODEL:-meta/llama-3.1-8b-instruct}
      NIM_BASE_URL: ${NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      DASHBOARD_BASE_URL: http://dashboard
    depends_on:
      - elasticmq

  harbor-runner:
    build:
      context: ..
      dockerfile: benchmarks/harbor/runner/Dockerfile
    environment:
      AGENTFORGE_DASHBOARD_URL: http://dashboard
      HARBOR_JOBS_DIR: /workspace/jobs
      AGENTFORGE_ROOT: /workspace
    volumes:
      - ..:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/libexec/docker/cli-plugins/docker-compose:/usr/libexec/docker/cli-plugins/docker-compose:ro
    ports:
      - "8090:8090"
    depends_on:
      - dashboard

  orchestrator:
    build: ./orchestrator
    environment:
      SQS_ENDPOINT_URL: http://elasticmq:9324
      TEAM_ORDER: researcher,summarizer,reviewer
    depends_on:
      - elasticmq
